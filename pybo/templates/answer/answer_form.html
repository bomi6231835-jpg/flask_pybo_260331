{% extends 'base.html' %}
    {% block content %}
        <div class="container">
            <h5 class = "my-3 border-bottom pb-2">답변수정</h5>
        </div>
    <form method="POST">
    {{ form.csrf_token }}
    {% include "form_errors.html" %}

    {{ form.content.label }}
    {{ form.content(class="form-control mb-3", row="10") }}

    <button type="submit" class="btn btn-primary">저장하기</button>
    </form>
</div>

{% endblock  %}
